[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd praxis/frontend/home && npm install && npm run build",
    "cd praxis/frontend/room && npm install && npm run build",
    "cd praxis/frontend/tools && npm install && npm run build",
]

[start]
cmd = "uvicorn praxis.api:app --host 0.0.0.0 --port ${PORT:-8000}"
