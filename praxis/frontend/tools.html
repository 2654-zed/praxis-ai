<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>All Tools — Praxis</title>
  <style>
    :root {
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.5rem; --space-6: 2rem; --space-7: 3rem; --space-8: 4rem;
      --bg-primary: #06060e;
      --bg-card: rgba(255,255,255,0.035);
      --bg-card-hover: rgba(255,255,255,0.055);
      --text-primary: #e8eaf6;
      --text-secondary: rgba(255,255,255,0.50);
      --text-dim: rgba(255,255,255,0.30);
      --accent: #7c6aef;
      --accent-glow: rgba(124,106,239,0.30);
      --accent-secondary: #50e3c2;
      --shadow-card: 0 2px 16px rgba(0,0,0,0.22), 0 0 0 1px rgba(255,255,255,0.03);
      --shadow-card-hover: 0 6px 28px rgba(124,106,239,0.10), 0 0 0 1px rgba(255,255,255,0.06);
      --radius-sm: 8px; --radius-md: 12px; --radius-card: 16px; --radius-pill: 999px;
      --line-tight: 1.3; --line-normal: 1.5; --line-relaxed: 1.65;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: var(--line-relaxed);
    }

    .aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .aurora::before {
      content: ''; position: absolute; width: 550px; height: 550px; border-radius: 50%;
      filter: blur(140px); opacity: 0.15;
      background: radial-gradient(circle, #7c6aef 0%, transparent 70%);
      top: -10%; left: -5%;
    }
    .noise {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px;
    }

    /* ── Nav Bar (bg shift, no bottom border) ── */
    .nav-bar {
      position: sticky; top: 0; z-index: 100;
      padding: var(--space-3) var(--space-5);
      display: flex; align-items: center; justify-content: center; gap: var(--space-6);
      background: rgba(6,6,14,0.75);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      box-shadow: 0 1px 12px rgba(0,0,0,0.25);
    }
    .nav-bar a {
      color: var(--text-secondary); text-decoration: none;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.3px;
      transition: color var(--transition-fast);
    }
    .nav-bar a:hover { color: var(--text-primary); }
    .nav-bar a.active { color: var(--accent); }
    .nav-logo { font-weight: 700; font-size: 0.95rem; color: var(--text-primary) !important; letter-spacing: -0.5px; }

    .content {
      position: relative; z-index: 2;
      max-width: 1000px; margin: 0 auto;
      padding: var(--space-7) var(--space-5) var(--space-8);
    }
    .content h2 {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: var(--space-6);
      line-height: var(--line-tight);
      background: linear-gradient(135deg, #e8eaf6, #7c6aef);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    #tools {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-5);
    }

    /* ── Tool Card (shadow, no border, generous padding) ── */
    .tool {
      background: var(--bg-card);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .tool::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    }
    .tool:hover {
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-3px);
    }
    .tool h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: var(--space-2);
      line-height: var(--line-tight);
    }
    .tool .meta {
      color: var(--text-dim); font-size: 0.78rem;
      margin-bottom: var(--space-3); line-height: var(--line-relaxed);
    }
    .tool .desc {
      color: var(--text-secondary); font-size: 0.85rem;
      line-height: var(--line-relaxed); margin-bottom: var(--space-3);
    }
    a.btn {
      display: inline-block; margin-top: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: linear-gradient(135deg, var(--accent), #6b5ce7); color: white;
      text-decoration: none; border-radius: var(--radius-sm);
      font-size: 0.8rem; font-weight: 600;
      transition: all var(--transition-fast);
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    a.btn:hover {
      background: linear-gradient(135deg, #6b5ce7, #5a4ad6);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    @media (max-width: 768px) {
      #tools { grid-template-columns: 1fr; }
      .nav-bar { gap: var(--space-4); font-size: 0.75rem; overflow-x: auto; justify-content: flex-start; padding-left: var(--space-4); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
    ::selection { background: rgba(124,106,239,0.3); color: white; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="noise"></div>

  <nav class="nav-bar">
    <a href="/" class="nav-logo">Praxis</a>
    <a href="/">Search</a>
    <a href="/static/journey.html">Journey</a>
    <a href="/static/tools.html" class="active">All Tools</a>
    <a href="/static/manifesto.html">Methodology</a>
  </nav>

  <div class="content">
    <h2>All Tools</h2>
    <div id="tools"></div>
  </div>

  <script>
  (async function() {
    const el = document.getElementById('tools');
    if (!el) return;
    el.innerHTML = '<p style="color:rgba(255,255,255,0.4)">Loading tools\u2026</p>';
    try {
      let allTools = [];
      let skip = 0;
      const limit = 50;
      while (true) {
        const res = await fetch('/tools?skip=' + skip + '&limit=' + limit);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const items = Array.isArray(data) ? data : (data.items || []);
        allTools = allTools.concat(items);
        if (items.length < limit) break;
        skip += limit;
      }
      el.innerHTML = '';
      if (!allTools.length) { el.textContent = 'No tools available.'; return; }
      allTools.forEach(function(t) {
        var d = document.createElement('div');
        d.className = 'tool';
        var h = document.createElement('h3');
        h.textContent = t.name || 'Unnamed';
        d.appendChild(h);
        if (t.description) {
          var desc = document.createElement('p');
          desc.className = 'desc';
          desc.textContent = t.description;
          d.appendChild(desc);
        }
        var meta = document.createElement('div');
        meta.className = 'meta';
        var cats = (t.categories || []).join(', ');
        var tags = (t.tags || []).slice(0, 5).join(', ');
        meta.textContent = cats + (tags ? ' \u00B7 ' + tags : '');
        d.appendChild(meta);
        if (t.url) {
          var a = document.createElement('a');
          a.href = t.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.className = 'btn';
          a.textContent = 'Visit \u2192';
          d.appendChild(a);
        }
        el.appendChild(d);
      });
      var heading = document.querySelector('.content h2');
      if (heading) heading.textContent = 'All Tools (' + allTools.length + ')';
    } catch (e) {
      console.error('Tools load failed:', e);
      el.innerHTML = '<p style="color:#f66">Failed to load tools: ' + e.message + '</p>';
    }
  })();
  </script>
</body>
</html>
